<article 
  class="menu-card" 
  (click)="onCardClick()" 
  (keydown.enter)="onKeydown($event)" 
  tabindex="0" 
  role="button" 
  aria-pressed="false">
  @if (item.image) {
    <div class="menu-card-image">
      <img [src]="item.image" [alt]="name" />
    </div>
  }
  <div class="menu-card-body">
    <div class="menu-card-title">
      <h3>{{ name }}</h3>
      <span>{{ item.price }}</span>
    </div>
    <p class="menu-card-subtitle">{{ description }}</p>
  </div>
</article>
